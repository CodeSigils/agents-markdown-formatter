name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Checkout code
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download oxfmt binary (Phase A - auto-download for CI)
      run: |
        curl -L https://github.com/oxc-project/oxc/releases/latest/download/oxfmt-x86_64-unknown-linux-musl.tar.gz | tar xz
        chmod +x oxfmt
        echo "$PWD" >> $GITHUB_PATH
    
    - name: Verify oxfmt is available
      run: oxfmt --version
    
    - name: Run structural guard tests
      run: npm test

    - name: Run formatter check (clean fixtures only)
      run: node skills/markdown-formatter/src/index.js --check --all test/fixtures/current/ test/fixtures/oxfmt-spike/

    - name: Run formatter check on MDX fixture
      run: node skills/markdown-formatter/src/index.js --check test/fixtures/current/sample.mdx

    - name: Test idempotence
      run: |
        set -e
        mkdir -p /tmp/idempotence
        find test/fixtures/current/ test/fixtures/oxfmt-spike/ -name "*.md" -o -name "*.mdx" | xargs -I{} cp {} /tmp/idempotence/
        node skills/markdown-formatter/src/index.js --all /tmp/idempotence/
        cp -r /tmp/idempotence /tmp/idempotence_copy
        node skills/markdown-formatter/src/index.js --all /tmp/idempotence/
        diff -rq /tmp/idempotence /tmp/idempotence_copy && echo "Idempotence: PASS" || (echo "Idempotence: FAIL — files changed on second pass" && exit 1)